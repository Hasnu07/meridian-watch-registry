<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian — Client</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background:                  '#16130b',
            'surface-container-low':     '#1f1b13',
            'surface-container':         '#231f17',
            'surface-container-high':    '#2d2a21',
            'surface-container-highest': '#38342b',
            'surface-variant':           '#38342b',
            'outline-variant':           '#4d4635',
            outline:                     '#99907c',
            primary:                     '#f2ca50',
            'on-primary':                '#3c2f00',
            'on-surface':                '#eae1d4',
            'on-surface-variant':        '#d0c5af',
            error:                       '#ffb4ab',
          }
        }
      }
    }
  </script>
  <style>
    .font-playfair { font-family: 'Playfair Display', serif; }
    .glass-surface { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
    .tbl-row { transition: background .15s; }
    .tbl-row:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body class="bg-background text-on-surface font-['Inter'] antialiased min-h-screen">

  <!-- Header -->
  <header class="border-b border-outline-variant/15 px-8 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-playfair font-semibold text-primary tracking-wide">Meridian</h1>
      <p class="text-[9px] uppercase tracking-[0.3em] text-outline mt-0.5">Elite Horology</p>
    </div>
    <span class="text-[10px] uppercase tracking-widest text-outline border border-outline-variant/30 px-3 py-1.5 rounded-full">Confidential</span>
  </header>

  <!-- Loading -->
  <div id="loadingState" class="flex flex-col items-center justify-center py-32">
    <div class="w-8 h-8 border-2 border-primary/30 border-t-primary rounded-full animate-spin mb-4"></div>
    <p class="text-on-surface-variant text-sm">Loading…</p>
  </div>

  <!-- Error -->
  <div id="errorState" class="hidden flex flex-col items-center justify-center py-32 text-center px-8">
    <span class="material-symbols-outlined text-outline text-5xl mb-4">link_off</span>
    <h2 class="font-playfair text-2xl text-on-surface mb-2">Invalid Link</h2>
    <p class="text-on-surface-variant text-sm">This link is invalid or has been revoked.</p>
  </div>

  <!-- Content -->
  <div id="content" class="hidden max-w-[1100px] mx-auto px-8 py-10">

    <!-- Client header -->
    <div class="mb-8 flex items-start gap-6">
      <div id="clientAvatar" class="w-20 h-20 rounded-full border border-outline-variant/30 flex items-center justify-center bg-surface-variant text-primary font-semibold text-2xl flex-shrink-0"></div>
      <div>
        <p class="text-[10px] uppercase tracking-[0.25em] text-primary font-semibold mb-1">Master Identity</p>
        <h2 id="clientName" class="font-playfair text-5xl font-semibold text-on-surface"></h2>
        <p id="clientMasterId" class="font-mono text-sm text-on-surface-variant mt-2"></p>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-4 max-w-xs mb-10">
      <div class="glass-surface rounded-xl p-4 flex flex-col gap-1">
        <span class="text-[10px] uppercase tracking-[0.15em] text-on-surface-variant font-semibold">Memberships</span>
        <span id="statMemberships" class="font-playfair text-2xl text-on-surface">—</span>
      </div>
      <div class="glass-surface rounded-xl p-4 flex flex-col gap-1">
        <span class="text-[10px] uppercase tracking-[0.15em] text-on-surface-variant font-semibold">Watches</span>
        <span id="statWatches" class="font-playfair text-2xl text-on-surface">—</span>
      </div>
    </div>

    <!-- Memberships -->
    <div id="membershipsList" class="space-y-6"></div>

  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center cursor-zoom-out" style="background:rgba(0,0,0,.88);backdrop-filter:blur(8px)" onclick="this.classList.add('hidden');this.classList.remove('flex')">
    <img id="lightboxImg" src="" class="max-w-[92vw] max-h-[92vh] rounded-xl shadow-2xl">
  </div>

<script>
const token = location.pathname.split('/c/')[1];

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtPrice(v, currency) {
  if (v == null || v === '') return null;
  const cur = currency || 'CHF';
  try {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: cur, minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Number(v));
  } catch {
    return cur + ' ' + Number(v).toLocaleString('en-US', { maximumFractionDigits: 0 });
  }
}
function fmtDate(d) {
  return d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : null;
}
function initials(n) {
  return (n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  const lb = document.getElementById('lightbox');
  lb.classList.remove('hidden'); lb.classList.add('flex');
}
function statusBadge(status) {
  const map = {
    wishlist:  { cls: 'border-amber-400/50 text-amber-400',     label: 'Wishlist'  },
    purchased: { cls: 'border-blue-400/50 text-blue-400',       label: 'Purchased' },
    sold:      { cls: 'border-emerald-400/50 text-emerald-400', label: 'Sold'      },
  };
  const s = map[status] || { cls: 'border-outline-variant/40 text-on-surface-variant', label: status || '—' };
  return `<span class="px-2.5 py-1 border text-[10px] font-semibold uppercase tracking-wider rounded-full ${s.cls}">${s.label}</span>`;
}

async function load() {
  try {
    const res = await fetch(`/api/share-client/${token}`);
    if (!res.ok) throw new Error();
    const { client, memberships } = await res.json();

    document.title = `Meridian — ${client.name}`;

    // Avatar
    const av = document.getElementById('clientAvatar');
    if (client.photo_path) {
      av.innerHTML = `<img src="${esc(client.photo_path)}" class="w-full h-full object-cover rounded-full cursor-zoom-in" onclick="openLightbox('${esc(client.photo_path)}')">`;
      av.className = 'w-20 h-20 rounded-full border border-outline-variant/30 overflow-hidden flex-shrink-0';
    } else {
      av.textContent = initials(client.name);
    }
    document.getElementById('clientName').textContent = client.name;
    document.getElementById('clientMasterId').textContent = client.master_id ? '#' + client.master_id : '';

    const totalWatches = memberships.reduce((s, m) => s + (m.watches || []).length, 0);
    document.getElementById('statMemberships').textContent = memberships.length;
    document.getElementById('statWatches').textContent     = totalWatches;

    document.getElementById('membershipsList').innerHTML = memberships.length ? memberships.map(m => `
      <div class="glass-surface rounded-2xl overflow-hidden">
        <!-- Membership header -->
        <div class="px-7 py-5 flex items-start gap-5 border-b border-outline-variant/10">
          <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-primary text-2xl">store</span>
          </div>
          <div class="flex-1">
            <p class="text-[10px] uppercase tracking-[0.2em] text-primary font-semibold mb-0.5">${esc(m.shop_name || 'Shop')}</p>
            <h3 class="font-playfair text-xl text-on-surface">${esc(m.name)}</h3>
            <div class="flex flex-wrap gap-x-8 gap-y-2 mt-3">
              ${m.email ? `<div><span class="text-[10px] uppercase tracking-widest text-outline">Email</span><p class="text-sm text-on-surface">${esc(m.email)}</p></div>` : ''}
              ${m.subscriber_id ? `<div><span class="text-[10px] uppercase tracking-widest text-outline">Subscriber ID</span><p class="text-sm font-mono text-on-surface">${esc(m.subscriber_id)}</p></div>` : ''}
              ${m.pp_urn ? `<div><span class="text-[10px] uppercase tracking-widest text-outline">PP URN</span><p class="text-sm font-mono text-on-surface">${esc(m.pp_urn)}</p></div>` : ''}
              ${m.address ? `<div><span class="text-[10px] uppercase tracking-widest text-outline">Address</span><p class="text-sm text-on-surface">${esc(m.address)}</p></div>` : ''}
            </div>
          </div>
        </div>
        <!-- Watches -->
        ${(m.watches && m.watches.length) ? `
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="border-b border-outline-variant/10" style="background:rgba(255,255,255,0.02)">
                <th class="px-7 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Timepiece</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Status</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Source</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Serial #</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Ref #</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Date</th>
                <th class="px-6 py-3 text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Price</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-white/[0.04]">
              ${m.watches.map(w => `
              <tr class="tbl-row">
                <td class="px-7 py-5">
                  <div class="flex items-center gap-3">
                    ${w.image_path
                      ? `<div class="w-12 h-12 rounded-lg border border-outline-variant/20 overflow-hidden flex-shrink-0 cursor-zoom-in" onclick="openLightbox('${esc(w.image_path)}')"><img src="${esc(w.image_path)}" class="w-full h-full object-cover"></div>`
                      : `<div class="w-12 h-12 rounded-lg border border-outline-variant/15 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-outline text-xl">watch</span></div>`
                    }
                    <div>
                      <p class="text-on-surface font-medium text-sm">${esc(w.model)}</p>
                      ${w.notes ? `<p class="text-on-surface-variant text-xs mt-0.5 max-w-[260px] truncate">${esc(w.notes)}</p>` : ''}
                    </div>
                  </div>
                </td>
                <td class="px-6 py-5">${statusBadge(w.status)}</td>
                <td class="px-6 py-5">
                  ${w.source === 'Company'
                    ? `<span class="px-3 py-1 border border-primary/50 text-primary text-[10px] font-semibold uppercase tracking-wider rounded-full">Company</span>`
                    : `<span class="px-3 py-1 border border-outline-variant/40 text-on-surface-variant text-[10px] font-semibold uppercase tracking-wider rounded-full">Dealer</span>`
                  }
                </td>
                <td class="px-6 py-5 text-on-surface-variant text-sm font-mono">${esc(w.serial_number || '—')}</td>
                <td class="px-6 py-5 text-on-surface-variant text-sm font-mono">${esc(w.reference_number || '—')}</td>
                <td class="px-6 py-5 text-on-surface-variant text-sm">${fmtDate(w.purchase_date) || '—'}</td>
                <td class="px-6 py-5 font-semibold text-primary text-sm">${fmtPrice(w.status === 'sold' ? w.sale_price : w.list_price, w.currency) || '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : `<p class="px-7 py-5 text-on-surface-variant text-sm">No watches recorded under this membership.</p>`}
      </div>
    `).join('') : `<p class="text-center text-on-surface-variant py-16">No memberships on record.</p>`;

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
  } catch {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
  }
}

load();
</script>
</body>
</html>
