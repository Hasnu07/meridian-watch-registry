<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patek Desk — pricing &amp; negotiation terminal</title>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { background: #0c0c0e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #f4f1ea; }
    #root { min-height: 100%; }
    #__boot { position: fixed; inset: 0; display: grid; place-items: center; background: #0c0c0e; }
    #__boot .mark { width: 96px; height: 96px; border-radius: 22px; border: 3px solid #c9a96a; display: grid; place-items: center; color: #c9a96a; font-weight: 700; font-size: 38px; letter-spacing: 0.08em; font-family: "Inter Tight", sans-serif; }
  </style>
</head>
<body>
  <div id="root">
    <div id="__boot">
      <div class="mark">PK</div>
    </div>
  </div>
  <div id="__err" style="position:fixed;left:12px;right:12px;bottom:12px;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;font:12px/1.4 ui-monospace,monospace;white-space:pre-wrap;max-height:40vh;overflow:auto;display:none;z-index:9999;"></div>

  <script>
    // Surface load-time errors so we never end up with a silent blank page.
    window.addEventListener('error', (e) => {
      const box = document.getElementById('__err');
      if (box) { box.style.display = 'block'; box.textContent += '[error] ' + (e.message || e.type) + '\n'; }
    });
    window.addEventListener('unhandledrejection', (e) => {
      const box = document.getElementById('__err');
      if (box) { box.style.display = 'block'; box.textContent += '[promise] ' + (e.reason && (e.reason.stack || e.reason.message) || e.reason) + '\n'; }
    });
  </script>

  <!-- Babel Standalone — transpiles the inline JSX at runtime. -->
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>

  <!-- Patek Desk app: exact JSX from PatekDesk.jsx, kept intact (the only
       additions are a localStorage shim for window.storage and inline SVG
       icons in place of lucide-react). Babel transpiles JSX + ESM imports
       so this runs natively in the browser without a build step. -->
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

    /* =============================================================================
       PATEK DESK — pricing & negotiation terminal
       Direct port of PatekDesk.jsx, UI kept intact. lucide-react icons replaced
       with a tiny inline-SVG <Icon name="..."/> so the page has zero npm deps.
       window.storage is shimmed onto localStorage so the original persistence
       call sites (await window.storage.get/set) work unchanged.
       ============================================================================= */

    // ── window.storage shim (localStorage-backed, async to match original API) ──
    if (!window.storage) {
      window.storage = {
        get: async (k) => {
          try { const v = localStorage.getItem(k); return v != null ? { value: v } : null; }
          catch { return null; }
        },
        set: async (k, v) => { try { localStorage.setItem(k, v); } catch {} },
      };
    }

    // ── Inline SVG icons (replaces lucide-react). 24x24, stroke-based, weight 2. ──
    const ICON_PATHS = {
      plus:        '<path d="M12 5v14M5 12h14"/>',
      x:           '<path d="M18 6 6 18M6 6l12 12"/>',
      trash:       '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
      search:      '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
      calculator:  '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/>',
      database:    '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>',
      settings:    '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      chevronDown: '<path d="m6 9 6 6 6-6"/>',
      download:    '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      upload:      '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
      layers:      '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
      percent:     '<line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
      coins:       '<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.71.71-2.83 2.83"/>',
    };
    function Icon({ name, size = 16, color = 'currentColor', style }) {
      const path = ICON_PATHS[name];
      if (!path) return null;
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
             stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
             style={style} dangerouslySetInnerHTML={{ __html: path }} />
      );
    }
    // Aliases mirroring the original lucide-react imports
    const Plus        = (p) => <Icon name="plus"        {...p} />;
    const X           = (p) => <Icon name="x"           {...p} />;
    const Trash2      = (p) => <Icon name="trash"       {...p} />;
    const Search      = (p) => <Icon name="search"      {...p} />;
    const Calculator  = (p) => <Icon name="calculator"  {...p} />;
    const Database    = (p) => <Icon name="database"    {...p} />;
    const Settings    = (p) => <Icon name="settings"    {...p} />;
    const ChevronDown = (p) => <Icon name="chevronDown" {...p} />;
    const Download    = (p) => <Icon name="download"    {...p} />;
    const Upload      = (p) => <Icon name="upload"      {...p} />;
    const Layers      = (p) => <Icon name="layers"      {...p} />;
    const Percent     = (p) => <Icon name="percent"     {...p} />;
    const Coins       = (p) => <Icon name="coins"       {...p} />;

    // ── App constants (unchanged from JSX) ────────────────────────────────────
    const CURRENCIES = ['EUR', 'USD', 'GBP', 'CHF'];
    const SYM = { EUR: '€', USD: '$', GBP: '£', CHF: 'CHF ' };

    const COUNTRIES = [
      { code: 'IT', name: 'Italy',       flag: '🇮🇹', cur: 'EUR' },
      { code: 'UK', name: 'England',     flag: '🇬🇧', cur: 'GBP' },
      { code: 'CH', name: 'Switzerland', flag: '🇨🇭', cur: 'CHF' },
      { code: 'DE', name: 'Germany',     flag: '🇩🇪', cur: 'EUR' },
      { code: 'ES', name: 'Spain',       flag: '🇪🇸', cur: 'EUR' },
    ];
    const CUR_OF = Object.fromEntries(COUNTRIES.map(c => [c.code, c.cur]));

    const STORE_KEY = 'PATEK_DESK_V2';
    const DEFAULT_FX = { EUR: 1, USD: 0.92, GBP: 1.18, CHF: 1.05 };

    const SEED = {
      watches: [
        { id: 'w1', ref: '5968A-001',     model: 'Aquanaut Chrono SS Blue',        market: 115000, marketCur: 'EUR', list: { IT: 58206, UK: 0, CH: 0, DE: 0, ES: 0 } },
        { id: 'w2', ref: '5990/1R-001',   model: 'Nautilus Travel Time Chrono RG', market: 230000, marketCur: 'EUR', list: { IT: 131375, UK: 0, CH: 0, DE: 0, ES: 0 } },
        { id: 'w3', ref: '5980/1400G-010',model: 'Nautilus Chrono WG Gem-Set',     market: 520000, marketCur: 'EUR', list: { IT: 722265, UK: 0, CH: 0, DE: 0, ES: 0 } },
        { id: 'w4', ref: '5168G-010',     model: 'Aquanaut Jumbo WG',              market: 90000,  marketCur: 'EUR', list: { IT: 55004, UK: 0, CH: 0, DE: 0, ES: 0 } },
        { id: 'w5', ref: '5172G-001',     model: 'Chronograph WG',                 market: 130000, marketCur: 'EUR', list: { IT: 92307, UK: 0, CH: 0, DE: 0, ES: 0 } },
      ],
      fx: DEFAULT_FX,
    };

    const eur  = (n) => '€' + Math.round(n || 0).toLocaleString('en-US');
    const eurS = (n) => (n < 0 ? '−' : '+') + '€' + Math.abs(Math.round(n || 0)).toLocaleString('en-US');
    const fmtCur = (n, cur) => (cur === 'CHF' ? 'CHF ' : SYM[cur]) + Math.round(n || 0).toLocaleString('en-US');
    const parseNum = (s) => parseInt(String(s).replace(/[^0-9]/g, ''), 10) || 0;
    const uid = () => 'w' + Math.random().toString(36).slice(2, 9);
    const toEur = (amount, cur, fx) => (amount || 0) * (fx[cur] ?? 1);

    function bestListEur(w, fx) {
      let best = null, code = null, native = 0;
      for (const c of COUNTRIES) {
        const raw = w.list?.[c.code];
        if (raw && raw > 0) {
          const e = toEur(raw, c.cur, fx);
          if (best === null || e < best) { best = e; code = c.code; native = raw; }
        }
      }
      return { eur: best || 0, code, native, cur: code ? CUR_OF[code] : 'EUR' };
    }

    function PatekDesk() {
      const [tab, setTab] = useState('desk');
      const [watches, setWatches] = useState([]);
      const [fx, setFx] = useState(DEFAULT_FX);
      const [loaded, setLoaded] = useState(false);

      const [lines, setLines] = useState([]);
      const [mode, setMode] = useState('vat');
      const [vat, setVat] = useState(21);

      useEffect(() => {
        (async () => {
          try {
            const r = await window.storage.get(STORE_KEY);
            if (r && r.value) {
              const d = JSON.parse(r.value);
              setWatches(d.watches || SEED.watches);
              setFx({ ...DEFAULT_FX, ...(d.fx || {}) });
            } else { setWatches(SEED.watches); setFx(DEFAULT_FX); }
          } catch { setWatches(SEED.watches); setFx(DEFAULT_FX); }
          setLoaded(true);
        })();
      }, []);

      useEffect(() => {
        if (!loaded) return;
        (async () => { try { await window.storage.set(STORE_KEY, JSON.stringify({ watches, fx })); } catch {} })();
      }, [watches, fx, loaded]);

      const byId = useMemo(() => Object.fromEntries(watches.map(w => [w.id, w])), [watches]);

      const calc = useMemo(() => {
        const v = vat / 100;
        let listSum = 0, paidSum = 0, marketSum = 0, vatRec = 0;
        const rows = lines.map((ln) => {
          const w = byId[ln.wid];
          if (!w) return null;
          const bc = ln.buyCountry && w.list?.[ln.buyCountry] > 0 ? ln.buyCountry : bestListEur(w, fx).code;
          const listNative = bc ? (w.list?.[bc] || 0) : 0;
          const listCur = bc ? CUR_OF[bc] : 'EUR';
          const listEur = toEur(listNative, listCur, fx);
          const paidNative = ln.paid != null ? ln.paid : listNative;
          const paidCur = ln.paid != null ? (ln.paidCur || 'EUR') : listCur;
          const paidEur = toEur(paidNative, paidCur, fx);
          const marketEur = toEur(w.market || 0, w.marketCur || 'EUR', fx);
          const dList = paidEur - listEur;
          const dPct = listEur ? (dList / listEur) * 100 : 0;
          const back = mode === 'vat' ? paidEur - paidEur / (1 + v) : 0;
          const eff = paidEur - back;
          const margin = marketEur - eff;
          listSum += listEur; paidSum += paidEur; marketSum += marketEur; vatRec += back;
          const tone = dList < 0 ? 'gift' : (dPct > 50 ? 'loaded' : 'premium');
          return { ln, w, bc, listNative, listCur, listEur, paidNative, paidCur, paidEur, marketEur, dList, dPct, back, eff, margin, tone };
        }).filter(Boolean);
        const effTot = paidSum - vatRec;
        const marginTot = marketSum - effTot;
        return { rows, listSum, paidSum, marketSum, vatRec, effTot, marginTot, marginPct: effTot ? marginTot / effTot * 100 : 0 };
      }, [lines, byId, mode, vat, fx]);

      const addLine = (wid) => {
        const b = bestListEur(byId[wid], fx);
        setLines(ls => [...ls, { wid, paid: null, paidCur: b.cur, buyCountry: b.code }]);
      };
      const removeLine = (i) => setLines(ls => ls.filter((_, x) => x !== i));
      const setPaid = (i, val) => setLines(ls => ls.map((l, x) => x === i ? { ...l, paid: val } : l));
      const setPaidCur = (i, cur) => setLines(ls => ls.map((l, x) => x === i ? { ...l, paidCur: cur } : l));
      const setBuy = (i, code) => setLines(ls => ls.map((l, x) => x === i ? { ...l, buyCountry: code, paidCur: l.paid == null ? CUR_OF[code] : l.paidCur } : l));

      const addWatch = () => setWatches(ws => [{ id: uid(), ref: '', model: '', market: 0, marketCur: 'EUR', list: { IT:0,UK:0,CH:0,DE:0,ES:0 } }, ...ws]);
      const updWatch = (id, patch) => setWatches(ws => ws.map(w => w.id === id ? { ...w, ...patch } : w));
      const updList = (id, code, val) => setWatches(ws => ws.map(w => w.id === id ? { ...w, list: { ...w.list, [code]: val } } : w));
      const delWatch = (id) => setWatches(ws => ws.filter(w => w.id !== id));
      const setRate = (cur, val) => setFx(f => ({ ...f, [cur]: val }));

      const exportJSON = () => {
        const blob = new Blob([JSON.stringify({ watches, fx }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'patek_desk_backup.json'; a.click();
        URL.revokeObjectURL(url);
      };
      const importJSON = (e) => {
        const f = e.target.files?.[0]; if (!f) return;
        const r = new FileReader();
        r.onload = () => { try { const d = JSON.parse(r.result); if (d.watches) setWatches(d.watches); if (d.fx) setFx({ ...DEFAULT_FX, ...d.fx }); } catch {} };
        r.readAsText(f);
      };

      const C = {
        bg: '#0c0c0e', panel: '#131316', panel2: '#0f0f12', line: '#26262c',
        gold: '#c9a96a', cream: '#f4f1ea', mut: '#8a857c', dim: '#5f5b53',
        teal: '#5dcaa5', amber: '#ef9f27', red: '#e24b4a', greenbg: '#0f2e22', redbg: '#2e1414',
      };

      if (!loaded) return <div style={{ background: C.bg, color: C.cream, minHeight: '100vh', display: 'grid', placeItems: 'center', fontFamily: 'ui-sans-serif, system-ui' }}>Loading…</div>;

      return (
        <div style={{ background: C.bg, minHeight: '100vh', color: C.cream, fontFamily: 'ui-sans-serif, system-ui, sans-serif' }}>
          <style>{`
            * { box-sizing: border-box; }
            .pk-in { background:#0c0c0e; border:1px solid ${C.line}; color:${C.cream}; border-radius:8px; padding:7px 10px; font-size:13px; outline:none; width:100%; }
            .pk-in:focus { border-color:${C.gold}; }
            .pk-sel { background:#0c0c0e; border:1px solid ${C.line}; color:${C.cream}; border-radius:8px; padding:7px 8px; font-size:12px; outline:none; }
            .pk-tab { padding:9px 16px; border-radius:9px; font-size:13px; cursor:pointer; border:1px solid transparent; background:transparent; color:${C.mut}; display:flex; align-items:center; gap:7px; }
            .pk-tab.on { background:${C.panel}; border-color:${C.line}; color:${C.cream}; }
            .pk-btn { background:transparent; border:1px solid ${C.line}; color:${C.cream}; border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
            .pk-btn:hover { border-color:${C.gold}; }
            input[type=range]{ accent-color:${C.gold}; }
            ::-webkit-scrollbar{width:10px;height:10px} ::-webkit-scrollbar-thumb{background:${C.line};border-radius:6px}
          `}</style>

          <div style={{ borderBottom: `1px solid ${C.line}`, padding: '16px 22px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, background: 'rgba(12,12,14,0.92)', backdropFilter: 'blur(8px)', zIndex: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 34, height: 34, borderRadius: 9, border: `1px solid ${C.gold}`, display: 'grid', placeItems: 'center', color: C.gold, fontWeight: 600, fontSize: 15, letterSpacing: '0.04em' }}>PK</div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, letterSpacing: '0.02em' }}>Patek Desk</div>
                <div style={{ fontSize: 11, color: C.dim }}>pricing & negotiation terminal</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className={`pk-tab ${tab==='desk'?'on':''}`} onClick={() => setTab('desk')}><Calculator size={14}/> Deal</button>
              <button className={`pk-tab ${tab==='lib'?'on':''}`} onClick={() => setTab('lib')}><Database size={14}/> Price list</button>
              <button className={`pk-tab ${tab==='set'?'on':''}`} onClick={() => setTab('set')}><Settings size={14}/> Data & FX</button>
            </div>
          </div>

          <div style={{ maxWidth: 1120, margin: '0 auto', padding: '22px' }}>

            {tab === 'desk' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>

                <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'center', fontSize: 12, color: C.mut }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 6, color: C.dim }}><Coins size={13}/> current rates →</span>
                  {CURRENCIES.filter(c => c !== 'EUR').map(c => (
                    <span key={c} style={{ color: C.cream }}>1 {c} = <span style={{ color: C.gold }}>{(fx[c] ?? 1).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 })} €</span></span>
                  ))}
                  <button className="pk-btn" style={{ padding: '4px 10px', fontSize: 11 }} onClick={() => setTab('set')}>edit</button>
                </div>

                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 18 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <Layers size={14} style={{ color: C.gold }} />
                    <span style={{ fontSize: 13, color: C.mut }}>Package metric</span>
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button onClick={() => setMode('list')} style={modeBtn(mode==='list', C)}>List only</button>
                    <button onClick={() => setMode('vat')} style={modeBtn(mode==='vat', C)}>With VAT</button>
                  </div>
                  {mode === 'vat' && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1, minWidth: 220 }}>
                      <Percent size={13} style={{ color: C.mut }} />
                      <span style={{ fontSize: 12, color: C.mut }}>recoverable VAT</span>
                      <input type="range" min="0" max="22" step="0.5" value={vat} onChange={e => setVat(parseFloat(e.target.value))} style={{ flex: 1 }} />
                      <span style={{ fontSize: 13, fontWeight: 600, minWidth: 44, color: C.gold }}>{vat}%</span>
                    </div>
                  )}
                  <div style={{ fontSize: 11, color: C.dim, maxWidth: 250 }}>
                    {mode === 'list' ? 'Margin = market − paid. VAT ignored.' : 'Margin = market − (paid − recoverable VAT).'}
                  </div>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(160px,1fr))', gap: 12 }}>
                  <Metric C={C} n="1" label="Δ vs list" value={eurS(calc.paidSum - calc.listSum)}
                          sub={`paid ${eur(calc.paidSum)} vs list ${eur(calc.listSum)}`}
                          color={calc.paidSum - calc.listSum <= 0 ? C.teal : C.amber} />
                  <Metric C={C} n="2" label="Effective cost" value={eur(calc.effTot)}
                          sub={mode==='vat' ? `VAT back ${eur(calc.vatRec)}` : 'VAT not applied'} color={C.cream} />
                  <Metric C={C} n="3" label="Package margin" value={eurS(calc.marginTot)}
                          sub={`${calc.marginPct.toFixed(1)}% on eff. cost`} color={calc.marginTot >= 0 ? C.teal : C.red} big />
                  <Metric C={C} label="Cash out" value={eur(calc.paidSum)} sub={`${calc.rows.length} pieces · in €`} color={C.cream} />
                </div>

                {calc.rows.length > 0 && (
                  <div style={{ borderRadius: 12, padding: '13px 16px', fontSize: 14, background: calc.marginTot >= 0 ? C.greenbg : C.redbg, color: calc.marginTot >= 0 ? C.teal : C.red, border: `1px solid ${calc.marginTot >= 0 ? '#1d6e56' : '#791f1f'}` }}>
                    {calc.marginTot >= 0
                      ? `✓ Positive deal: ${eurS(calc.marginTot)} (${calc.marginPct.toFixed(1)}% on effective cost). ${mode==='vat' ? 'Includes VAT recovery.' : 'Prices only, no VAT.'}`
                      : `△ Losing deal: ${eurS(calc.marginTot)} at these market prices. ${mode==='vat' ? 'Even with VAT recovered.' : 'Try the VAT mode.'}`}
                  </div>
                )}

                <AddPiece C={C} watches={watches} fx={fx} onAdd={addLine} />

                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {calc.rows.length === 0 && (
                    <div style={{ textAlign: 'center', color: C.dim, padding: '30px 0', fontSize: 13 }}>
                      Add the pieces the dealer is offering you to build the deal.
                    </div>
                  )}
                  {calc.rows.map((r, i) => (
                    <div key={i} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: '12px 14px', borderLeft: `3px solid ${r.tone==='gift'?C.teal:r.tone==='loaded'?C.red:C.amber}` }}>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'flex-end' }}>
                        <div style={{ flex: 1, minWidth: 140 }}>
                          <div style={{ fontSize: 14, fontWeight: 600 }}>{r.w.ref || '—'}</div>
                          <div style={{ fontSize: 12, color: C.mut }}>{r.w.model}</div>
                        </div>
                        <div style={{ minWidth: 118 }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>buy in</div>
                          <select className="pk-sel" value={r.bc || ''} onChange={e => setBuy(i, e.target.value)} style={{ width: '100%' }}>
                            {COUNTRIES.map(c => (
                              <option key={c.code} value={c.code} disabled={!(r.w.list?.[c.code] > 0)}>
                                {c.flag} {c.code} {r.w.list?.[c.code] > 0 ? `· ${fmtCur(r.w.list[c.code], c.cur)}` : '· —'}
                              </option>
                            ))}
                          </select>
                          <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>{r.listEur ? `= ${eur(r.listEur)}` : ''}</div>
                        </div>
                        <div style={{ minWidth: 150 }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>paid price</div>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <input className="pk-in" value={(r.paidNative).toLocaleString('en-US')} onChange={e => setPaid(i, parseNum(e.target.value))} style={{ flex: 1 }} />
                            <select className="pk-sel" value={r.paidCur} onChange={e => setPaidCur(i, e.target.value)}>
                              {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                          </div>
                          <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>{r.paidCur !== 'EUR' ? `= ${eur(r.paidEur)}` : ''}</div>
                        </div>
                        <div style={{ minWidth: 84, textAlign: 'right' }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>Δ list</div>
                          <div style={{ fontSize: 14, fontWeight: 600, color: r.dList <= 0 ? C.teal : C.amber }}>{eurS(r.dList)}</div>
                          <div style={{ fontSize: 10, color: C.dim }}>{(r.dPct>0?'+':'')+r.dPct.toFixed(0)}%</div>
                        </div>
                        <div style={{ minWidth: 84, textAlign: 'right' }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>eff. cost</div>
                          <div style={{ fontSize: 14, fontWeight: 600 }}>{eur(r.eff)}</div>
                        </div>
                        <div style={{ minWidth: 84, textAlign: 'right' }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>market</div>
                          <div style={{ fontSize: 14, fontWeight: 600, color: C.cream }}>{eur(r.marketEur)}</div>
                        </div>
                        <span style={{ fontSize: 11, padding: '3px 9px', borderRadius: 7, background: '#0c0c0e', border: `1px solid ${C.line}`, color: r.tone==='gift'?C.teal:r.tone==='loaded'?C.red:C.amber }}>
                          {r.tone==='gift'?'gift':r.tone==='loaded'?'loaded':'premium'}
                        </span>
                        <button onClick={() => removeLine(i)} className="pk-btn" style={{ padding: '6px 8px' }}><X size={14}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === 'lib' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ fontSize: 14, color: C.mut }}>{watches.length} references · list prices in native currency · market price your choice</div>
                  <button className="pk-btn" onClick={addWatch}><Plus size={14}/> New piece</button>
                </div>
                {watches.map(w => {
                  const b = bestListEur(w, fx);
                  const mEur = toEur(w.market || 0, w.marketCur || 'EUR', fx);
                  return (
                    <div key={w.id} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
                      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'flex-end', marginBottom: 12 }}>
                        <div style={{ width: 150 }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>reference</div>
                          <input className="pk-in" value={w.ref} placeholder="5968A-001" onChange={e => updWatch(w.id, { ref: e.target.value })} />
                        </div>
                        <div style={{ flex: 1, minWidth: 160 }}>
                          <div style={{ fontSize: 10, color: C.dim, marginBottom: 3 }}>model</div>
                          <input className="pk-in" value={w.model} placeholder="Aquanaut Chrono…" onChange={e => updWatch(w.id, { model: e.target.value })} />
                        </div>
                        <div style={{ width: 180 }}>
                          <div style={{ fontSize: 10, color: C.gold, marginBottom: 3 }}>market price</div>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <input className="pk-in" value={(w.market||0).toLocaleString('en-US')} onChange={e => updWatch(w.id, { market: parseNum(e.target.value) })} style={{ borderColor: C.gold, flex: 1 }} />
                            <select className="pk-sel" value={w.marketCur || 'EUR'} onChange={e => updWatch(w.id, { marketCur: e.target.value })}>
                              {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                          </div>
                          <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>{(w.marketCur||'EUR') !== 'EUR' ? `= ${eur(mEur)}` : ''}</div>
                        </div>
                        <button onClick={() => delWatch(w.id)} className="pk-btn" style={{ padding: '7px 9px', borderColor: '#5a2020' }}><Trash2 size={14}/></button>
                      </div>
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(130px,1fr))', gap: 8 }}>
                        {COUNTRIES.map(c => {
                          const isBest = b.code === c.code && (w.list?.[c.code] > 0);
                          const native = w.list?.[c.code] || 0;
                          return (
                            <div key={c.code}>
                              <div style={{ fontSize: 10, color: isBest ? C.teal : C.dim, marginBottom: 3, display: 'flex', justifyContent: 'space-between' }}>
                                <span>{c.flag} {c.name} <span style={{ color: C.dim }}>({c.cur})</span></span>{isBest && <span>↓ best</span>}
                              </div>
                              <input className="pk-in" value={native ? native.toLocaleString('en-US') : ''} placeholder="—"
                                     onChange={e => updList(w.id, c.code, parseNum(e.target.value))}
                                     style={isBest ? { borderColor: C.teal } : {}} />
                              <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>{native && c.cur !== 'EUR' ? `= ${eur(toEur(native, c.cur, fx))}` : ''}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {tab === 'set' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 18 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, display: 'flex', alignItems: 'center', gap: 8 }}><Coins size={15} style={{ color: C.gold }}/> Manual FX rates</div>
                  <div style={{ fontSize: 12, color: C.mut, marginBottom: 14 }}>You set the current rate. All calculations convert to euro using these values. 1 unit of currency = how many euros.</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(150px,1fr))', gap: 10 }}>
                    {CURRENCIES.filter(c => c !== 'EUR').map(c => (
                      <div key={c} style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 12 }}>
                        <div style={{ fontSize: 12, color: C.mut, marginBottom: 6 }}>1 {c} =</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <input className="pk-in" type="number" step="0.0001" value={fx[c] ?? ''} onChange={e => setRate(c, parseFloat(e.target.value) || 0)} style={{ borderColor: C.gold }} />
                          <span style={{ color: C.gold, fontSize: 14 }}>€</span>
                        </div>
                      </div>
                    ))}
                    <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 12, opacity: 0.6 }}>
                      <div style={{ fontSize: 12, color: C.mut, marginBottom: 6 }}>1 EUR =</div>
                      <div style={{ fontSize: 15, color: C.cream }}>1.00 € <span style={{ fontSize: 11, color: C.dim }}>(base)</span></div>
                    </div>
                  </div>
                </div>
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 18 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>List countries</div>
                  <div style={{ fontSize: 12, color: C.mut, marginBottom: 12 }}>Five markets, each in its native currency.</div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {COUNTRIES.map(c => (
                      <span key={c.code} style={{ padding: '6px 12px', borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 13 }}>{c.flag} {c.name} · <span style={{ color: C.gold }}>{c.cur}</span></span>
                    ))}
                  </div>
                </div>
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 18 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Data backup</div>
                  <div style={{ fontSize: 12, color: C.mut, marginBottom: 12 }}>Price list and FX rates are saved on this device. Export a JSON for safety.</div>
                  <div style={{ display: 'flex', gap: 10 }}>
                    <button className="pk-btn" onClick={exportJSON}><Download size={14}/> Export JSON</button>
                    <label className="pk-btn" style={{ cursor: 'pointer' }}><Upload size={14}/> Import JSON
                      <input type="file" accept="application/json" onChange={importJSON} style={{ display: 'none' }} />
                    </label>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function modeBtn(on, C) {
      return { background: on ? C.gold : 'transparent', color: on ? '#1a1208' : C.mut, border: `1px solid ${on ? C.gold : C.line}`, borderRadius: 8, padding: '7px 14px', fontSize: 13, fontWeight: on ? 600 : 400, cursor: 'pointer' };
    }

    function Metric({ C, n, label, value, sub, color, big }) {
      return (
        <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 12, padding: '13px 15px' }}>
          <div style={{ fontSize: 12, color: C.mut, display: 'flex', alignItems: 'center', gap: 6 }}>
            {n && <span style={{ width: 16, height: 16, borderRadius: 5, background: C.gold, color: '#1a1208', fontSize: 10, fontWeight: 700, display: 'grid', placeItems: 'center' }}>{n}</span>}
            {label}
          </div>
          <div style={{ fontSize: big ? 26 : 22, fontWeight: 600, color, marginTop: 6 }}>{value}</div>
          <div style={{ fontSize: 11, color: C.dim, marginTop: 2 }}>{sub}</div>
        </div>
      );
    }

    function AddPiece({ C, watches, fx, onAdd }) {
      const [open, setOpen] = useState(false);
      const [q, setQ] = useState('');
      const ref = useRef(null);
      useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h);
      }, []);
      const filtered = watches.filter(w => (w.ref + ' ' + w.model).toLowerCase().includes(q.toLowerCase()));
      return (
        <div ref={ref} style={{ position: 'relative' }}>
          <button className="pk-btn" onClick={() => setOpen(o => !o)} style={{ padding: '10px 16px' }}><Plus size={15}/> Add piece to deal <ChevronDown size={14}/></button>
          {open && (
            <div style={{ position: 'absolute', top: '110%', left: 0, zIndex: 30, width: 380, maxWidth: '90vw', background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, boxShadow: '0 12px 40px rgba(0,0,0,0.5)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#0c0c0e', border: `1px solid ${C.line}`, borderRadius: 8, padding: '6px 10px', marginBottom: 8 }}>
                <Search size={14} style={{ color: C.mut }} />
                <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="search ref or model" style={{ background: 'transparent', border: 'none', outline: 'none', color: C.cream, fontSize: 13, flex: 1 }} />
              </div>
              <div style={{ maxHeight: 260, overflowY: 'auto' }}>
                {filtered.length === 0 && <div style={{ padding: 14, fontSize: 13, color: C.dim, textAlign: 'center' }}>no pieces — add one in Price list</div>}
                {filtered.map(w => {
                  const b = bestListEur(w, fx);
                  return (
                    <div key={w.id} onClick={() => { onAdd(w.id); setOpen(false); setQ(''); }} style={{ padding: '9px 10px', borderRadius: 8, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                         onMouseEnter={e => e.currentTarget.style.background = '#1a1a1f'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600 }}>{w.ref || '—'}</div>
                        <div style={{ fontSize: 11, color: C.mut }}>{w.model}</div>
                      </div>
                      <div style={{ fontSize: 11, color: C.dim, textAlign: 'right' }}>
                        {b.eur ? <>best {eur(b.eur)}<br/>{COUNTRIES.find(c=>c.code===b.code)?.flag} {b.code} · {b.cur}</> : 'no list'}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────────────
    const bootEl = document.getElementById('__boot');
    if (bootEl) bootEl.remove();
    const root = createRoot(document.getElementById('root'));
    root.render(<PatekDesk />);
  </script>
</body>
</html>
